<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mafia Online</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- SVG filter for torn paper edges (invisible, just defines the filter) -->
    <svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
        <defs>
            <filter id="torn" x="-5%" y="-5%" width="110%" height="110%">
                <feTurbulence type="turbulence" baseFrequency="0.04" numOctaves="4" seed="15" result="noise"/>
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="6" xChannelSelector="R" yChannelSelector="G"/>
            </filter>
        </defs>
    </svg>

    <div class="container">

        <!-- Title with flanking weapon silhouettes -->
        <div class="title-area">
            <!-- Dagger (pointing up) -->
            <svg class="weapon-icon" width="22" height="64" viewBox="0 0 22 64" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                <path d="M11,1 L14,34 L11,38 L8,34 Z"/>
                <path d="M3,36 L19,36 L18,41 L4,41 Z"/>
                <rect x="8" y="41" width="6" height="17" rx="1.5"/>
                <ellipse cx="11" cy="61" rx="6" ry="3"/>
            </svg>

            <h1>Mafia Online</h1>

            <!-- Pistol (pointing left) -->
            <svg class="weapon-icon" width="72" height="48" viewBox="0 0 72 48" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                <rect x="2" y="15" width="34" height="9" rx="2"/>
                <rect x="30" y="10" width="22" height="18" rx="2"/>
                <path d="M34,28 L49,28 L53,46 L32,46 Z"/>
                <path d="M51,10 L57,5 L61,9 L55,15 Z"/>
                <path d="M37,28 Q50,33 50,46" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round"/>
                <line x1="42" y1="28" x2="41" y2="37" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            </svg>
        </div>

        <!-- Decorative separator with crossed weapons -->
        <div class="title-rule">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                <path d="M1,1 L13,13 M13,1 L1,13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                <circle cx="7" cy="7" r="2"/>
            </svg>
        </div>

        <!-- ── Main Menu ──────────────────────────────────── -->
        <div id="main-menu" class="menu-section">
            <h2>Choose Your Fate</h2>
            <button id="create-room-btn" class="btn btn-danger">Create New Room</button>
            <button id="join-room-btn" class="btn btn-secondary">Join Room</button>
            <button id="list-rooms-btn" class="btn btn-info">Browse Rooms</button>
        </div>

        <!-- ── Create Room ───────────────────────────────── -->
        <div id="create-room-section" class="menu-section hidden">
            <h2>Create New Room</h2>
            <div class="form-group">
                <label for="creator-name">Your Name</label>
                <input type="text" id="creator-name" placeholder="3–12 characters" minlength="3" maxlength="12">
            </div>
            <div class="form-group">
                <label for="join-code">Join Code (optional)</label>
                <input type="text" id="join-code" placeholder="4–12 chars (or leave empty)" minlength="4" maxlength="12">
            </div>
            <div class="form-group">
                <label for="min-players">Min Players</label>
                <input type="number" id="min-players" value="3" min="3" max="10">
            </div>
            <div class="form-group">
                <label for="max-players">Max Players</label>
                <input type="number" id="max-players" value="6" min="3" max="10">
            </div>
            <div class="form-group">
                <label for="day-duration">Discussion Time (seconds)</label>
                <input type="number" id="day-duration" value="30" min="10" max="120">
            </div>
            <button id="submit-create-room" class="btn btn-danger">Create Room</button>
            <button id="back-from-create" class="btn btn-secondary">Back</button>
        </div>

        <!-- ── Join Room ─────────────────────────────────── -->
        <div id="join-room-section" class="menu-section hidden">
            <h2>Join Room</h2>
            <div class="form-group">
                <label for="room-code">Room Code</label>
                <input type="text" id="room-code" placeholder="4–12 characters" minlength="4" maxlength="12">
            </div>
            <div class="form-group">
                <label for="player-name">Your Name</label>
                <input type="text" id="player-name" placeholder="3–12 characters" minlength="3" maxlength="12">
            </div>
            <button id="submit-join-room" class="btn btn-danger">Enter Room</button>
            <button id="back-from-join" class="btn btn-secondary">Back</button>
        </div>

        <!-- ── Room List ──────────────────────────────────── -->
        <div id="room-list-section" class="menu-section hidden">
            <h2>Open Rooms</h2>
            <div id="rooms-list" class="rooms-list"></div>
            <button id="refresh-rooms" class="btn btn-info">Refresh</button>
            <button id="back-from-list" class="btn btn-secondary">Back</button>
        </div>

        <!-- ── Game Room ──────────────────────────────────── -->
        <div id="game-room-section" class="menu-section hidden">
            <!-- Day/Night phase clock — spins on phase transitions -->
            <svg id="phase-clock" class="phase-clock clock-hidden" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <!-- Day half (top) -->
                <path d="M2,50 A48,48 0 0,1 98,50 Z" fill="#1a1400"/>
                <!-- Night half (bottom) -->
                <path d="M98,50 A48,48 0 0,1 2,50 Z" fill="#0a0a1a"/>
                <!-- Ring -->
                <circle cx="50" cy="50" r="48" fill="none" stroke="#3a1010" stroke-width="2"/>
                <!-- Divider -->
                <line x1="2" y1="50" x2="98" y2="50" stroke="#3a1010" stroke-width="1" opacity="0.5"/>
                <!-- Sun (top) -->
                <circle cx="50" cy="22" r="7" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.5"/>
                <g stroke="#c9a84c" stroke-width="1" opacity="0.3">
                    <line x1="50" y1="11" x2="50" y2="7"/>
                    <line x1="59" y1="14" x2="63" y2="11"/>
                    <line x1="41" y1="14" x2="37" y2="11"/>
                    <line x1="61" y1="22" x2="65" y2="22"/>
                    <line x1="39" y1="22" x2="35" y2="22"/>
                </g>
                <!-- Moon (bottom) -->
                <path d="M45,78 Q55,68 45,62 Q57,66 57,72 Q57,80 45,78Z" fill="#6666aa" opacity="0.4"/>
                <!-- Stars -->
                <circle cx="36" cy="68" r="1" fill="#8888cc" opacity="0.35"/>
                <circle cx="62" cy="82" r="0.8" fill="#8888cc" opacity="0.3"/>
                <circle cx="40" cy="86" r="0.7" fill="#8888cc" opacity="0.25"/>
                <!-- Hand -->
                <line id="clock-hand" x1="50" y1="50" x2="50" y2="10" stroke="#c0392b" stroke-width="3" stroke-linecap="round"/>
                <!-- Center -->
                <circle cx="50" cy="50" r="4" fill="#8b0000"/>
                <circle cx="50" cy="50" r="2" fill="#c0392b"/>
            </svg>
            <h2>The Room</h2>
            <div id="room-info">
                <p><strong>Code:</strong> <span id="current-room-code"></span></p>
                <p><strong>Players:</strong> <span id="player-count">0</span> / <span id="max-players-display">0</span></p>
                <p><strong>Phase:</strong> <span id="game-phase">LOBBY</span></p>
            </div>
            <div id="role-banner" class="role-banner hidden"></div>
            <div id="players-list" class="players-list"></div>
            <div id="phase-actions" class="phase-actions"></div>
            <div id="game-actions">
                <button id="start-game-btn" class="btn btn-danger hidden">Start Game</button>
                <button id="leave-room-btn" class="btn btn-secondary">Leave Room</button>
            </div>
        </div>

        <!-- ── Messages ───────────────────────────────────── -->
        <div id="messages" class="messages"></div>

    </div>

    <script src="script.js"></script>
</body>
</html>
